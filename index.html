<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DriveTalk</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #1b2333;
    --panel-light: #232d42;
    --text: #f4f6fb;
    --muted: #8b93a7;
    --accent: #22c55e;
    --accent-dark: #16a34a;
    --danger: #dc2626;
    --warn: #f59e0b;
    --edit: #3b82f6;
    --discard: #374151;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 18px 40px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }

  .brand-name {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }

  #recordButton {
    width: 100%;
    max-width: 380px;
    height: 190px;
    border: none;
    border-radius: 28px;
    background: var(--accent);
    color: #0f1420;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  #recordButton:disabled { background: #4b5563; color: var(--muted); cursor: not-allowed; }
  #recordButton:active { transform: scale(0.97); }
  #recordButton.recording { background: var(--danger); color: #fff; animation: pulse 1.4s infinite; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
  }

  .mic-icon { width: 34px; height: 34px; flex-shrink: 0; }

  #status {
    margin-top: 22px;
    font-size: 1rem;
    color: var(--warn);
    min-height: 26px;
    text-align: center;
  }

  #transcriptCard {
    display: none;
    margin-top: 8px;
    background: var(--panel);
    border-radius: 16px;
    padding: 18px;
    max-width: 380px;
    width: 100%;
    text-align: left;
  }

  #transcriptLabel {
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  #transcript {
    font-size: 1.05rem;
    line-height: 1.55;
    color: var(--text);
    white-space: pre-wrap;
  }

  #editBox {
    display: none;
    width: 100%;
    max-width: 380px;
    background: var(--panel);
    border: 1px solid var(--panel-light);
    border-radius: 16px;
    padding: 16px;
    color: var(--text);
    font-size: 1.05rem;
    font-family: inherit;
    line-height: 1.5;
    resize: vertical;
    min-height: 120px;
    margin-top: 8px;
  }

  #editBox:focus { outline: 2px solid var(--edit); }

  #actions {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-top: 18px;
    width: 100%;
    max-width: 380px;
  }

  .action-btn {
    width: 100%;
    padding: 16px;
    border-radius: 14px;
    border: none;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.12s ease, opacity 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    font-family: inherit;
  }

  .action-btn:active { transform: scale(0.98); opacity: 0.85; }
  .action-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .btn-send { background: var(--accent); color: #0f1420; }
  .btn-edit { background: var(--edit); color: #fff; }
  .btn-rerecord { background: var(--warn); color: #0f1420; }
  .btn-discard { background: var(--discard); color: #d1d5db; }

  #noSupport {
    color: #f87171;
    margin-top: 16px;
    font-size: 0.9rem;
    text-align: center;
    max-width: 320px;
  }

  #banner {
    display: none;
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 0.92rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    line-height: 1.4;
  }

  #banner.success { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  #banner.failure { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }

  @media (prefers-reduced-motion: reduce) {
    #recordButton.recording { animation: none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">DriveTalk <span style="color: var(--muted); font-weight: 500;">v3</span></div>
  </div>
  <p class="tagline">Tap, speak your delivery note, and send it straight to the sheet.</p>

  <button id="recordButton">
    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="23"></line>
      <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
    <span id="btnLabel">Tap to record</span>
  </button>

  <div id="noSupport" style="display:none;">Speech recognition isn't supported in this browser. Please open DriveTalk in Chrome.</div>

  <div id="status">Ready</div>

  <div id="transcriptCard">
    <div id="transcriptLabel">Your note</div>
    <div id="transcript"></div>
  </div>

  <textarea id="editBox" placeholder="Edit your note here..."></textarea>

  <div id="actions">
    <button class="action-btn btn-send" id="btnSend">Send note</button>
    <button class="action-btn btn-edit" id="btnEdit">Edit note</button>
    <button class="action-btn btn-rerecord" id="btnRerecord">Re-record</button>
    <button class="action-btn btn-discard" id="btnDiscard">Discard</button>
  </div>

  <div id="banner"></div>
</div>

<script>
  // ---------------------------------------------------------------
  // Paste the URL you get from deploying the Google Apps Script
  // web app here. Instructions for creating it are in the chat.
  // ---------------------------------------------------------------
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5CDWhOxFzj3YWSRPAQsA38nLyBS5b1WZ11A8hOT6niO2qhMTlVjTeXyUVf_jGsXcKmA/exec";

  const recordButton = document.getElementById("recordButton");
  const btnLabel = document.getElementById("btnLabel");
  const status = document.getElementById("status");
  const noSupport = document.getElementById("noSupport");
  const transcriptCard = document.getElementById("transcriptCard");
  const transcript = document.getElementById("transcript");
  const editBox = document.getElementById("editBox");
  const actions = document.getElementById("actions");
  const banner = document.getElementById("banner");

  const btnSend = document.getElementById("btnSend");
  const btnEdit = document.getElementById("btnEdit");
  const btnRerecord = document.getElementById("btnRerecord");
  const btnDiscard = document.getElementById("btnDiscard");

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  let finalText = "";
  let isRecording = false;
  let isEditing = false;

  function resetToStart() {
    recordButton.style.display = "flex";
    recordButton.disabled = false;
    recordButton.classList.remove("recording");
    btnLabel.innerText = "Tap to record";
    transcriptCard.style.display = "none";
    editBox.style.display = "none";
    actions.style.display = "none";
    banner.style.display = "none";
    status.innerText = "Ready";
    finalText = "";
    isEditing = false;
  }

  function showReviewState() {
    recordButton.style.display = "none";
    transcriptCard.style.display = "block";
    transcript.innerText = finalText;
    actions.style.display = "flex";
    status.innerText = "What would you like to do with this note?";
  }

  function showBanner(kind, message) {
    banner.className = kind;
    banner.innerText = message;
    banner.style.display = "block";
  }

  if (!SpeechRecognition) {
    recordButton.disabled = true;
    noSupport.style.display = "block";
    status.innerText = "";
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = "en-GB";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    recordButton.addEventListener("click", () => {
      if (isRecording) return;
      finalText = "";
      isRecording = true;
      status.innerText = "Listening — speak now";
      recordButton.disabled = true;
      recordButton.classList.add("recording");
      btnLabel.innerText = "Recording...";
      try {
        recognition.start();
      } catch (e) {
        status.innerText = "Could not start recording. Try again.";
        isRecording = false;
        recordButton.disabled = false;
        recordButton.classList.remove("recording");
        btnLabel.innerText = "Tap to record";
      }
    });

    recognition.onresult = (e) => {
      finalText = e.results[0][0].transcript.trim();
    };

    recognition.onerror = (e) => {
      status.innerText = "Error: " + e.error + ". Try again.";
    };

    recognition.onend = () => {
      isRecording = false;
      recordButton.disabled = false;
      recordButton.classList.remove("recording");
      btnLabel.innerText = "Tap to record";

      if (finalText.length > 0) {
        showReviewState();
      } else {
        status.innerText = "No speech captured. Try again.";
      }
    };
  }

  btnEdit.addEventListener("click", () => {
    isEditing = true;
    editBox.value = finalText;
    transcriptCard.style.display = "none";
    editBox.style.display = "block";
    editBox.focus();
    status.innerText = "Editing note";

    // Swap Edit for Save while editing
    btnEdit.innerText = "Save changes";
    btnEdit.onclick = () => {
      finalText = editBox.value.trim();
      editBox.style.display = "none";
      btnEdit.innerText = "Edit note";
      btnEdit.onclick = null;
      isEditing = false;
      showReviewState();
    };
  });

  btnRerecord.addEventListener("click", () => {
    resetToStart();
  });

  btnDiscard.addEventListener("click", () => {
    resetToStart();
  });

  btnSend.addEventListener("click", async () => {
    if (!finalText || finalText.length === 0) return;

    btnSend.disabled = true;
    btnSend.innerText = "Sending...";
    status.innerText = "Sending note...";

    const submissionId = "dt-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
    const params = new URLSearchParams({
      note: finalText,
      timestamp: new Date().toISOString(),
      submissionId: submissionId
    });

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      const response = await fetch(APPS_SCRIPT_URL + "?" + params.toString(), {
        method: "GET",
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      if (!response.ok) throw new Error("Server responded with an error");

      showBanner("success", "Note sent successfully.");
      setTimeout(resetToStart, 1800);
    } catch (err) {
      const timedOut = err.name === "AbortError";
      showBanner("failure", timedOut
        ? "Sending timed out — likely weak signal. Your note is still shown below, try again."
        : "Failed to send. Check your connection and try again — your note is still shown below.");
      btnSend.disabled = false;
      btnSend.innerText = "Send note";
      status.innerText = "Send failed — try again";
    }
  });
</script>

</body>
</html>
