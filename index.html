<!DOCTYPE html>
<html lang="en-GB">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>DriveTalk</title>
<style>
  :root {
    --bg: #0f1420;
    --panel: #1b2333;
    --text: #f4f6fb;
    --muted: #8b93a7;
    --accent: #22c55e;
    --danger: #dc2626;
    --warn: #f59e0b;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    height: 100%;
  }

  .wrap {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 18px 40px;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 6px;
  }

  .brand-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--accent);
  }

  .brand-name {
    font-size: 1.05rem;
    font-weight: 600;
    letter-spacing: 0.02em;
    color: var(--text);
  }

  .tagline {
    color: var(--muted);
    font-size: 0.9rem;
    margin-bottom: 32px;
    text-align: center;
    max-width: 320px;
    line-height: 1.5;
  }

  #recordButton {
    width: 100%;
    max-width: 380px;
    height: 190px;
    border: none;
    border-radius: 28px;
    background: var(--accent);
    color: #0f1420;
    font-size: 1.5rem;
    font-weight: 700;
    cursor: pointer;
    transition: transform 0.15s ease, background 0.2s ease;
    touch-action: manipulation;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
  }

  #recordButton:disabled { background: #4b5563; color: var(--muted); cursor: not-allowed; }
  #recordButton:active { transform: scale(0.97); }
  #recordButton.recording { background: var(--danger); color: #fff; animation: pulse 1.4s infinite; }
  #recordButton.sending { background: var(--warn); color: #0f1420; }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(220,38,38,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(220,38,38,0); }
  }

  .mic-icon { width: 34px; height: 34px; flex-shrink: 0; }

  #status {
    margin-top: 22px;
    font-size: 1rem;
    color: var(--warn);
    min-height: 26px;
    text-align: center;
    max-width: 320px;
  }

  #lastNote {
    display: none;
    margin-top: 18px;
    background: var(--panel);
    border-radius: 16px;
    padding: 16px;
    max-width: 380px;
    width: 100%;
    text-align: left;
  }

  #lastNoteLabel {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--muted);
    margin-bottom: 6px;
  }

  #lastNoteText {
    font-size: 0.98rem;
    line-height: 1.5;
    color: var(--text);
  }

  #noSupport {
    color: #f87171;
    margin-top: 16px;
    font-size: 0.9rem;
    text-align: center;
    max-width: 320px;
  }

  #banner {
    display: none;
    margin-top: 18px;
    padding: 14px 16px;
    border-radius: 12px;
    font-size: 0.92rem;
    max-width: 380px;
    width: 100%;
    text-align: center;
    line-height: 1.4;
  }

  #banner.success { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
  #banner.failure { background: rgba(220,38,38,0.15); color: #f87171; border: 1px solid rgba(220,38,38,0.3); }

  @media (prefers-reduced-motion: reduce) {
    #recordButton.recording { animation: none; }
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="brand">
    <div class="brand-dot"></div>
    <div class="brand-name">DriveTalk <span style="color: var(--muted); font-weight: 500;">v3</span></div>
  </div>
  <p class="tagline">Tap the button, speak your note, and it's sent automatically when you stop talking.</p>

  <button id="recordButton">
    <svg class="mic-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
      <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
      <line x1="12" y1="19" x2="12" y2="23"></line>
      <line x1="8" y1="23" x2="16" y2="23"></line>
    </svg>
    <span id="btnLabel">Tap to record</span>
  </button>

  <div id="noSupport" style="display:none;">Speech recognition isn't supported in this browser. Please open DriveTalk in Chrome.</div>

  <div id="status">Ready</div>

  <div id="banner"></div>

  <div id="lastNote">
    <div id="lastNoteLabel">Last note sent</div>
    <div id="lastNoteText"></div>
  </div>
</div>

<script>
  // ---------------------------------------------------------------
  // Your Google Apps Script web app URL
  // ---------------------------------------------------------------
  const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw5CDWhOxFzj3YWSRPAQsA38nLyBS5b1WZ11A8hOT6niO2qhMTlVjTeXyUVf_jGsXcKmA/exec";

  const recordButton = document.getElementById("recordButton");
  const btnLabel = document.getElementById("btnLabel");
  const status = document.getElementById("status");
  const noSupport = document.getElementById("noSupport");
  const banner = document.getElementById("banner");
  const lastNote = document.getElementById("lastNote");
  const lastNoteText = document.getElementById("lastNoteText");

  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  let isBusy = false; // true while recording OR sending

  function setReady() {
    isBusy = false;
    recordButton.disabled = false;
    recordButton.classList.remove("recording", "sending");
    btnLabel.innerText = "Tap to record";
    status.innerText = "Ready";
  }

  function showBanner(kind, message) {
    banner.className = kind;
    banner.innerText = message;
    banner.style.display = "block";
    setTimeout(() => { banner.style.display = "none"; }, 4000);
  }

  async function sendNote(noteText) {
    recordButton.classList.remove("recording");
    recordButton.classList.add("sending");
    btnLabel.innerText = "Sending...";
    status.innerText = "Sending note...";

    const submissionId = "dt-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
    const params = new URLSearchParams({
      note: noteText,
      timestamp: new Date().toISOString(),
      submissionId: submissionId
    });

    try {
      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 15000);

      const response = await fetch(APPS_SCRIPT_URL + "?" + params.toString(), {
        method: "GET",
        signal: controller.signal
      });

      clearTimeout(timeoutId);

      if (!response.ok) throw new Error("Server responded with an error");

      showBanner("success", "Note sent.");
      lastNoteText.innerText = noteText;
      lastNote.style.display = "block";
    } catch (err) {
      const timedOut = err.name === "AbortError";
      showBanner("failure", timedOut
        ? "Sending timed out — likely weak signal. Please re-record this note."
        : "Failed to send. Please re-record this note.");
    } finally {
      setReady();
    }
  }

  if (!SpeechRecognition) {
    recordButton.disabled = true;
    noSupport.style.display = "block";
    status.innerText = "";
  } else {
    const recognition = new SpeechRecognition();
    recognition.lang = "en-GB";
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;
    recognition.continuous = false;

    let finalText = "";
    let recordingWatchdog = null;

    recordButton.addEventListener("click", () => {
      if (isBusy) return;
      finalText = "";
      isBusy = true;
      status.innerText = "Listening — speak now";
      recordButton.classList.add("recording");
      recordButton.disabled = true;
      btnLabel.innerText = "Recording...";
      banner.style.display = "none";
      try {
        recognition.start();
        recordingWatchdog = setTimeout(() => {
          try { recognition.stop(); } catch (e) {}
          status.innerText = "Recording timed out. Try again.";
          setReady();
        }, 20000);
      } catch (e) {
        status.innerText = "Could not start recording. Try again.";
        setReady();
      }
    });

    recognition.onresult = (e) => {
      finalText = e.results[0][0].transcript.trim();
    };

    recognition.onerror = (e) => {
      clearTimeout(recordingWatchdog);
      status.innerText = "Error: " + e.error + ". Try again.";
      setReady();
    };

    recognition.onend = () => {
      clearTimeout(recordingWatchdog);
      if (!isBusy) return; // already reset by onerror above
      if (finalText.length > 0) {
        sendNote(finalText);
      } else {
        status.innerText = "No speech captured. Try again.";
        setReady();
      }
    };
  }
</script>

</body>
</html>
